name: Daily Selenium Run

on:
  schedule:
    - cron: "30 12 * * *"   # 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selenium automation (20 min timeout)
        env:
          SEND_EMAIL_TO: ${{ secrets.SEND_EMAIL_TO }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          AUTH_STATE: ${{ secrets.AUTH_STATE }}
          WORK_TYPE: ${{ secrets.WORK_TYPE }}
          SAVE_AUTH_STATE: "1"
          HEADLESS: "1"
          TEST_MODE: "0"
        run: |
          timeout 1200 python typeformkalvium.py

      - name: Update AUTH_STATE secret if refreshed
        if: ${{ always() && hashFiles('auth.json') != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "GH_TOKEN secret missing; skipping AUTH_STATE rotation."
            exit 0
          fi

          gh secret set AUTH_STATE --repo sckchcm-g/ktypeformautomation < auth.json
          echo "AUTH_STATE secret updated from auth.json"