name: Daily Selenium Run

on:
  schedule:
    - cron: "30 12 * * *"   # 6:00 PM IST (UTC+5:30)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run selenium automation (20 min timeout)
        env:
          SEND_EMAIL_TO: ${{ secrets.SEND_EMAIL_TO }}
          EMAIL_USERNAME: ${{ secrets.EMAIL_USERNAME }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          AUTH_STATE: ${{ secrets.AUTH_STATE }}
          WORK_TYPE: ${{ secrets.WORK_TYPE }}
          HEADLESS: "1"
          TEST_MODE: "0"
        run: |
          timeout 1200 python typeformkalvium.py